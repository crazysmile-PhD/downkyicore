name: Build

permissions:
  contents: read

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-gate:
    name: Release gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore ./DownKyi.sln
      - name: Strict Release build
        run: >
          dotnet build ./DownKyi.sln
          -c Release
          --no-restore
          --no-incremental
          -p:TreatWarningsAsErrors=true
          -p:CodeAnalysisTreatWarningsAsErrors=true
          -p:EnableNETAnalyzers=true
          -p:AnalysisMode=All
          -p:EnforceCodeStyleInBuild=true
          -p:UseSharedCompilation=false
      - name: Test
        run: dotnet test ./DownKyi.sln -c Release --no-restore --no-build

  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    needs: release-gate
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
      - name: Print the changelog
        run: cat "${{ steps.git-cliff.outputs.changelog }}"
  build-windows:
    runs-on: windows-latest
    needs: changelog
    strategy:
      matrix:
        cpu: [ x64, x86 ]
        kind: [ zip ]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Read Version Text
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content -Raw version.txt).Trim()
          "content=$version" >> $env:GITHUB_OUTPUT
      - name: Install Pupnet
        run: |
          dotnet tool install --tool-path .\.tools KuiperZone.PupNet --version 1.8.0
      - name: Get Deps
        run: |
          .\ffmpeg.ps1 ${{ matrix.cpu }}
          .\aria2.ps1 ${{ matrix.cpu }}
        working-directory: ./script
      - name: Build validation publish
        run: >
          dotnet publish ./DownKyi/DownKyi.csproj
          -c Release
          -r win-${{ matrix.cpu }}
          --self-contained
          -p:Version=${{ steps.version.outputs.content }}
          -p:DebugType=None
          -p:DebugSymbols=false
          -o ./artifacts/publish/win-${{ matrix.cpu }}
      - name: Package
        run: |
          & "$env:GITHUB_WORKSPACE\.tools\pupnet.exe" DownKyi.pupnet.conf --app-version ${{ steps.version.outputs.content }} --kind ${{ matrix.kind }} -r win-${{ matrix.cpu }} -y
        working-directory: ./script/pupnet
      - name: Validate packaged runtime
        shell: pwsh
        run: |
          ./script/validate-publish-output.ps1 `
            -PublishDirectory "artifacts/publish/win-${{ matrix.cpu }}" `
            -RuntimeIdentifier "win-${{ matrix.cpu }}" `
            -ExpectedVersion "${{ steps.version.outputs.content }}" `
            -OutputPath "script/pupnet/output/publish-manifest-win-${{ matrix.cpu }}.json"
          $package = "script/pupnet/output/DownKyi-${{ steps.version.outputs.content }}-1.win-${{ matrix.cpu }}.${{ matrix.kind }}"
          $hash = (Get-FileHash -LiteralPath $package -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $([IO.Path]::GetFileName($package))" | Set-Content -LiteralPath "$package.sha256" -Encoding ascii
      - name: Upload build artifacts ${{ matrix.kind }}
        uses: actions/upload-artifact@v7
        with:
          name: DownKyi-${{ steps.version.outputs.content }}-1.win-${{ matrix.cpu }}.${{ matrix.kind }}
          path: |
            script/pupnet/output/DownKyi-${{ steps.version.outputs.content }}-1.win-${{ matrix.cpu }}.${{ matrix.kind }}
            script/pupnet/output/DownKyi-${{ steps.version.outputs.content }}-1.win-${{ matrix.cpu }}.${{ matrix.kind }}.sha256
            script/pupnet/output/publish-manifest-win-${{ matrix.cpu }}.json
  build-linux:
    runs-on: ubuntu-22.04
    needs: changelog
    strategy:
      matrix:
        cpu: [ x64, arm64 ]
        kind: [ AppImage, deb, rpm ]
        type: [ self-contained ]
        include:
          - kind: AppImage
            cpu: x64
            package-tail: .x86_64
            package-head: DownKyi-
          - kind: deb
            cpu: x64
            package-tail: _amd64
            package-head: downkyi_
          - kind: rpm
            cpu: x64
            package-tail: .x86_64
            package-head: downkyi_
          - kind: AppImage
            cpu: arm64
            package-tail: .aarch64
            package-head: DownKyi-
          - kind: deb
            cpu: arm64
            package-tail: _arm64
            package-head: downkyi_
        exclude:
          - kind: rpm
            cpu: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Read Version Text
        id: version
        run: |
          echo "content=$(tr -d '\r\n' < version.txt)" >> "$GITHUB_OUTPUT"
      - name: Install Pupnet
        run: |
          dotnet tool install --tool-path ./.tools KuiperZone.PupNet --version 1.8.0
          sudo apt-get update
          sudo apt-get install -y libfuse2
      - name: Get Deps
        run: |
          chmod +x ffmpeg.sh
          chmod +x aria2.sh
          ./ffmpeg.sh linux ${{ matrix.cpu }}
          ./aria2.sh linux-${{ matrix.cpu }}
        working-directory: ./script
      - name: Build validation publish
        run: >
          dotnet publish ./DownKyi/DownKyi.csproj
          -c Release
          -r linux-${{ matrix.cpu }}
          --self-contained
          -p:Version=${{ steps.version.outputs.content }}
          -p:DebugType=None
          -p:DebugSymbols=false
          -o ./artifacts/publish/linux-${{ matrix.cpu }}
      - name: Package
        run: |
          "$GITHUB_WORKSPACE/.tools/pupnet" DownKyi.pupnet.conf --app-version ${{ steps.version.outputs.content }} --kind ${{ matrix.kind }} -r linux-${{ matrix.cpu }} -y
        working-directory: ./script/pupnet
      - name: Change Name
        run: mv "${{ matrix.package-head }}${{ steps.version.outputs.content }}-1${{ matrix.package-tail }}.${{ matrix.kind }}" "${{ matrix.package-head }}${{ steps.version.outputs.content }}_linux_${{ matrix.type }}${{ matrix.package-tail }}.${{ matrix.kind }}"
        working-directory: ./script/pupnet/output/
      - name: Validate packaged runtime
        shell: pwsh
        run: |
          ./script/validate-publish-output.ps1 `
            -PublishDirectory "artifacts/publish/linux-${{ matrix.cpu }}" `
            -RuntimeIdentifier "linux-${{ matrix.cpu }}" `
            -ExpectedVersion "${{ steps.version.outputs.content }}" `
            -OutputPath "script/pupnet/output/publish-manifest-linux-${{ matrix.cpu }}-${{ matrix.kind }}.json"
          $package = Get-ChildItem "script/pupnet/output" -File -Filter "*${{ matrix.package-tail }}.${{ matrix.kind }}" |
            Select-Object -First 1
          if ($null -eq $package) { throw "Expected Linux package was not produced." }
          $hash = (Get-FileHash -LiteralPath $package.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($package.Name)" | Set-Content -LiteralPath "$($package.FullName).sha256" -Encoding ascii
      - name: Upload build artifacts ${{ matrix.kind }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package-head }}${{ steps.version.outputs.content }}_linux_${{ matrix.type }}${{ matrix.package-tail }}.${{ matrix.kind }}
          path: |
            script/pupnet/output/${{ matrix.package-head }}${{ steps.version.outputs.content }}_linux_${{ matrix.type }}${{ matrix.package-tail }}.${{ matrix.kind }}
            script/pupnet/output/${{ matrix.package-head }}${{ steps.version.outputs.content }}_linux_${{ matrix.type }}${{ matrix.package-tail }}.${{ matrix.kind }}.sha256
            script/pupnet/output/publish-manifest-linux-${{ matrix.cpu }}-${{ matrix.kind }}.json
  build-macos:
    runs-on: macos-15
    needs: changelog
    env:
      HAS_MACOS_SIGNING: ${{ secrets.MACOS_CERTIFICATE != '' && secrets.MACOS_CERTIFICATE_PWD != '' && secrets.APPLE_ID != '' && secrets.TEAM_ID != '' && secrets.APP_SPECIFIC_PASSWORD != '' }}
    strategy:
      matrix:
        cpu: [ x64, arm64 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Import certificate
        if: ${{ env.HAS_MACOS_SIGNING == 'true' }}
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}
      - name: Install Tool Via HomeBrew
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=true
          brew untap aws/tap || true
          brew install create-dmg tree
      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Read Version Text
        id: version
        run: |
          echo "content=$(tr -d '\r\n' < version.txt)" >> "$GITHUB_OUTPUT"
      - name: Get Deps
        run: |
          chmod +x aria2.sh
          chmod +x ffmpeg.sh
          ./aria2.sh osx-${{ matrix.cpu }}
          ./ffmpeg.sh mac ${{ matrix.cpu }}
        working-directory: ./script
      - name: Build ${{ matrix.cpu }}
        run: |
          dotnet restore
          dotnet publish DownKyi/DownKyi.csproj --self-contained -r osx-${{ matrix.cpu }} -c Release -p:DebugType=None -p:DebugSymbols=false
      - name: Package app
        run: |
          chmod +x package.sh
          ./package.sh ${{ matrix.cpu }}
        working-directory: ./script/macos
      - name: Validate packaged runtime
        shell: pwsh
        run: |
          ./script/validate-publish-output.ps1 `
            -PublishDirectory "DownKyi/bin/Release/net10.0/osx-${{ matrix.cpu }}/publish" `
            -RuntimeIdentifier "osx-${{ matrix.cpu }}" `
            -ExpectedVersion "${{ steps.version.outputs.content }}" `
            -OutputPath "script/macos/publish-manifest-osx-${{ matrix.cpu }}.json"
      - name: Sign app
        if: ${{ env.HAS_MACOS_SIGNING == 'true' }}
        run: |
          chmod +x sign.sh
          ./sign.sh
        working-directory: ./script/macos
      - name: Notarize app
        if: ${{ env.HAS_MACOS_SIGNING == 'true' }}
        run: |
          ditto -c -k --sequesterRsrc --keepParent 哔哩下载姬.app 哔哩下载姬.zip
          xcrun notarytool submit 哔哩下载姬.zip --apple-id "${{ secrets.APPLE_ID }}" --team-id "${{ secrets.TEAM_ID }}" --password "${{ secrets.APP_SPECIFIC_PASSWORD }}" --wait
          xcrun stapler staple 哔哩下载姬.app
          rm -rf ./哔哩下载姬.zip
        working-directory: ./script/macos
      - name: Create DMG
        run: |
          create-dmg \
          --hdiutil-quiet \
          --icon 哔哩下载姬.app 165 175 \
          --icon-size 120 \
          --app-drop-link 495 175 \
          --window-size 660 400 \
          DownKyi-${{ steps.version.outputs.content }}-osx-${{ matrix.cpu }}.dmg 哔哩下载姬.app
        working-directory: ./script/macos
      - name: Notarize DMG
        if: ${{ env.HAS_MACOS_SIGNING == 'true' }}
        run: |
          xcrun notarytool submit DownKyi-${{ steps.version.outputs.content }}-osx-${{ matrix.cpu }}.dmg --apple-id "${{ secrets.APPLE_ID }}" --team-id "${{ secrets.TEAM_ID }}" --password "${{ secrets.APP_SPECIFIC_PASSWORD }}" --wait
          xcrun stapler staple DownKyi-${{ steps.version.outputs.content }}-osx-${{ matrix.cpu }}.dmg
        working-directory: ./script/macos
      - name: Hash DMG
        shell: pwsh
        run: |
          $package = "script/macos/DownKyi-${{ steps.version.outputs.content }}-osx-${{ matrix.cpu }}.dmg"
          $hash = (Get-FileHash -LiteralPath $package -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $([IO.Path]::GetFileName($package))" | Set-Content -LiteralPath "$package.sha256" -Encoding ascii
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: DownKyi-${{ steps.version.outputs.content }}-osx-${{ matrix.cpu }}.dmg
          path: |
            script/macos/DownKyi-${{ steps.version.outputs.content }}-osx-${{ matrix.cpu }}.dmg
            script/macos/DownKyi-${{ steps.version.outputs.content }}-osx-${{ matrix.cpu }}.dmg.sha256
            script/macos/publish-manifest-osx-${{ matrix.cpu }}.json
  release:
    name: Publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [changelog, build-windows, build-linux, build-macos]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true
      - name: Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          replacesArtifacts: true
          artifacts: artifacts/*
          body: ${{ needs.changelog.outputs.release_body }}
