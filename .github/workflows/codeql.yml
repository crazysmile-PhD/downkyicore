name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '24 18 * * 2'

permissions:
  actions: read
  contents: read
  security-events: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: '1'

jobs:
  analyze:
    name: Analyze C#
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
      - name: Restore
        run: dotnet restore ./DownKyi.sln
      - name: Build
        run: dotnet build ./DownKyi.sln -c Release --no-restore --no-incremental
      - name: Analyze
        uses: github/codeql-action/analyze@v4
