name: Protobuf

on:
  pull_request:
    paths:
      - 'DownKyi.Core/BiliApi/protobuf/**'
      - 'DownKyi.Core/DownKyi.Core.csproj'
      - 'Directory.Packages.props'
      - '.github/workflows/protobuf.yml'
  push:
    branches:
      - main
    paths:
      - 'DownKyi.Core/BiliApi/protobuf/**'
      - 'DownKyi.Core/DownKyi.Core.csproj'
      - 'Directory.Packages.props'
      - '.github/workflows/protobuf.yml'

jobs:
  build-generated-code:
    name: Build generated protobuf code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore
      - name: Build DownKyi.Core
        run: dotnet build ./DownKyi.Core/DownKyi.Core.csproj -c Release --no-restore --no-incremental
