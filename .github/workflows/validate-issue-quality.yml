name: Validate Issue Quality

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required bug report content
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";
            const title = issue.title || "";
            const labels = issue.labels || [];
            const lowerLabels = labels.map(label => label.name.toLowerCase());

            if (issue.pull_request) {
              core.info("This is a pull request. Skip validation.");
              return;
            }

            const isBug =
              lowerLabels.includes("bug") ||
              title.toLowerCase().includes("[bug]") ||
              body.includes("### 🚨 問題類型");

            if (!isBug) {
              core.info("Not a bug report. Skip validation.");
              return;
            }

            function escapeRegex(text) {
              return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            function getSection(label) {
              const regex = new RegExp(
                `### ${escapeRegex(label)}\\s*\\n([\\s\\S]*?)(?=\\n### |$)`,
                "i"
              );

              const match = body.match(regex);
              return match ? match[1].trim() : "";
            }

            function isFilled(text) {
              return (text || "").trim().length > 0;
            }

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name,
                    color,
                    description
                  });
                } else {
                  throw error;
                }
              }
            }

            const requiredSections = [
              "🚨 問題類型",
              "📦 downkyiCore 版本",
              "📥 取得方式",
              "💻 作業系統",
              "🧩 作業系統詳細版本",
              "🖥️ 系統架構",
              "🔑 B 站登入狀態",
              "👑 大會員狀態",
              "🌐 網路環境",
              "🔍 解析模式",
              "⬇️ 下載器",
              "🎬 BV 號 / AV 號 / 影片連結",
              "🚨 問題摘要",
              "🔁 重現步驟",
              "✅ 預期行為",
              "❌ 實際行為",
              "🧨 錯誤訊息",
              "📄 日誌內容",
              "🛠️ 已嘗試的解決方式",
              "📊 發生頻率",
              "🔄 是否為舊版本正常、新版本異常？"
            ];

            const problems = [];

            for (const section of requiredSections) {
              const text = getSection(section);

              if (!isFilled(text)) {
                problems.push(`${section}：未填寫`);
              }
            }

            const marker = "<!-- issue-quality-validator -->";
            const hadMissingInfo = lowerLabels.includes("missing-info");

            if (problems.length === 0) {
              core.info("Issue passed validation.");

              if (hadMissingInfo) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: "missing-info"
                }).catch(() => {});
              }

              if (issue.state === "closed" && hadMissingInfo) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: "open"
                });

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: [
                    marker,
                    "必要欄位已補齊，Issue 已自動重新開啟。"
                  ].join("\n")
                });
              }

              return;
            }

            await ensureLabel(
              "missing-info",
              "d73a4a",
              "Issue is missing required diagnostic information"
            );

            const commentBody = [
              marker,
              "此 Bug 回報仍有必要欄位未填寫。",
              "",
              "請補齊以下欄位：",
              "",
              ...problems.map(problem => `- ${problem}`),
              "",
              "規則：",
              "",
              "- 只檢查欄位是否有填寫",
              "- 不檢查字數",
              "- 不檢查日誌格式",
              "- 不禁止填寫「無 / 沒有 / 不知道」",
              "",
              "補齊後系統會再次檢查；若所有必要欄位都有內容，missing-info 會被移除，必要時 Issue 會自動重新開啟。"
            ].join("\n");

            if (!hadMissingInfo) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ["missing-info"]
              });
            }

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100
            });

            const existingComment = comments.data.find(comment =>
              comment.user &&
              comment.user.type === "Bot" &&
              comment.body &&
              comment.body.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: commentBody
              });
            }

            const shouldCloseIssue =
              context.payload.action === "opened" ||
              context.payload.action === "reopened";

            if (shouldCloseIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: "closed",
                state_reason: "not_planned"
              });
            } else {
              core.info("Issue still has empty fields after edit, but will not be closed again.");
            }
